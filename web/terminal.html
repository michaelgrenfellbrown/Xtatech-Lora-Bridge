<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Local Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/png" href="/xtatech.png"/>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; color: #111; }
    .card { background: white; border-radius: 10px; padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
    .page-header { display: flex; align-items: center; gap: 14px; }
    .page-header img { width: 120px; max-width: 34vw; height: auto; }
    .page-header h2 { margin: 0 0 4px; }
    .small { font-size: 12px; color: #666; }
    .nav { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    .nav a { color: #164f8b; text-decoration: none; }
    .banner { border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; border: 1px solid #ffd591; background: #fff7e6; color: #7a4b00; }
    .terminal { background: #0b0f0c; color: #98fb98; font-family: Consolas, Monaco, monospace; font-size: 13px; padding: 12px; height: 480px; overflow: auto; white-space: pre-wrap; border-radius: 8px; }
    input, button { padding: 9px 12px; margin: 6px 0; box-sizing: border-box; }
    input { width: 100%; }
    button { cursor: pointer; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .row button { width: auto; }
  </style>
</head>
<body>
<div class="card">
  <div class="page-header">
    <img src="/xtatech.png" alt="Xtatech logo"/>
    <div>
      <h2>Local Terminal</h2>
      <div class="nav small"><a href="/">Dashboard</a><a href="/diagnostics">Diagnostics</a><a href="/services">Services</a><a href="/metrics">Metrics</a></div>
    </div>
  </div>
</div>

<div class="banner">
  This opens a shell on the bridge as the service user. Keep the token private and disable this page when you do not need it.
</div>

<div class="card">
  <label>Terminal token</label>
  <input id="token" type="password" autocomplete="current-password" placeholder="Token from terminal.token in config.yaml"/>
  <div class="row">
    <button onclick="connectTerminal()">Connect</button>
    <button onclick="disconnectTerminal()">Disconnect</button>
    <button onclick="sendCtrlC()">Ctrl-C</button>
    <button onclick="clearTerminal()">Clear</button>
  </div>
  <div id="terminal" class="terminal"></div>
  <input id="command" autocomplete="off" placeholder="Type a command and press Enter"/>
</div>

<script>
let ws = null;
let sawSocketError = false;
const terminal = document.getElementById('terminal');
const command = document.getElementById('command');

function cleanTerminalText(text) {
  return String(text)
    .replace(/\x1b\][^\x07]*(\x07|\x1b\\)/g, '')
    .replace(/\x1b\[[0-?]*[ -/]*[@-~]/g, '')
    .replace(/^bash: cannot set terminal process group.*\n?/gm, '')
    .replace(/^bash: no job control in this shell\n?/gm, '')
    .replace(/\r\n/g, '\n')
    .replace(/\r/g, '\n');
}

function append(text) {
  terminal.textContent += cleanTerminalText(text);
  terminal.scrollTop = terminal.scrollHeight;
}

function clearTerminal() {
  terminal.textContent = '';
}

function connectTerminal() {
  const token = document.getElementById('token').value.trim();
  if (!token) {
    append('Enter the terminal token first.\n');
    return;
  }
  disconnectTerminal();
  sawSocketError = false;
  const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${window.location.host}/ws/terminal?token=${encodeURIComponent(token)}`);
  ws.onopen = () => append('[connected]\n');
  ws.onmessage = (event) => append(event.data);
  ws.onclose = () => append(sawSocketError ? '\n[connection closed after websocket error]\n' : '\n[disconnected]\n');
  ws.onerror = () => {
    sawSocketError = true;
    append('\n[terminal websocket error]\n');
  };
}

function disconnectTerminal() {
  if (ws && ws.readyState === WebSocket.OPEN) ws.close();
  ws = null;
}

function sendText(text) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    append('Not connected.\n');
    return;
  }
  ws.send(text);
}

function sendCtrlC() {
  sendText('\x03');
}

command.addEventListener('keydown', (event) => {
  if (event.key !== 'Enter') return;
  event.preventDefault();
  const text = command.value;
  command.value = '';
  append(`$ ${text}\n`);
  sendText(`${text}\n`);
});
</script>
</body>
</html>
